</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐧 Ubuntu VPS Ready!</h1>
            <p>Your virtual server is running</p>
            <span class="badge">🟢 ONLINE</span>
        </div>
        
        <div class="card">
            <h3>🔐 Login Credentials</h3>
