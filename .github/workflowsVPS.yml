name: 🚀 Create Ubuntu VPS

on:
  workflow_dispatch:
    inputs:
      username:
        description: '👤 Username'
        required: true
        default: 'ubuntu-vps'
      duration:
        description: '⏱️ Duration (hours)'
        required: true
        default: '6'
        type: choice
        options:
          - '1'
          - '2'
          - '4'
          - '6'
          - '12'

jobs:
  create-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 43200  # 30 days max
    
    steps:
    - name: 📦 Update system
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-server curl jq net-tools
        
    - name: 👤 Create user
      run: |
        USERNAME="${{ github.event.inputs.username }}"
        PASSWORD=$(openssl rand -base64 12 | tr -d '=+/' | cut -c1-12)
        
        echo "USERNAME=$USERNAME" >> $GITHUB_ENV
        echo "PASSWORD=$PASSWORD" >> $GITHUB_ENV
        
        sudo useradd -m -s /bin/bash $USERNAME
        echo "$USERNAME:$PASSWORD" | sudo chpasswd
        sudo usermod -aG sudo $USERNAME
        echo "✅ User created: $USERNAME"
        
    - name: 🔧 Configure SSH
      run: |
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
        echo "✅ SSH configured"
        
    - name: 🌐 Install ngrok
      run: |
        wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
        tar xzf ngrok-v3-stable-linux-amd64.tgz
        sudo mv ngrok /usr/local/bin/
        rm ngrok-v3-stable-linux-amd64.tgz
        
        if [ -n "${{ secrets.NGROK_TOKEN }}" ]; then
          ngrok config add-authtoken ${{ secrets.NGROK_TOKEN }}
          echo "✅ ngrok configured"
        else
          echo "⚠️ No ngrok token found"
        fi
        
    - name: ☁️ Install cloudflared
      run: |
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
        chmod +x cloudflared-linux-amd64
        sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
        echo "✅ cloudflared installed"
        
    - name: 🚀 Start tunnels (ngrok + cloudflared)
      run: |
        # Start ngrok (TCP)
        if [ -n "${{ secrets.NGROK_TOKEN }}" ]; then
          nohup ngrok tcp 22 --log=stdout > ngrok.log 2>&1 &
          echo "✅ ngrok started"
        fi
        
        # Start cloudflared (HTTP)
        nohup cloudflared tunnel --url ssh://localhost:22 > cloudflared.log 2>&1 &
        echo "✅ cloudflared started"
        
        # Wait for tunnels to establish
        sleep 10
        
    - name: 📡 Get tunnel URLs
      run: |
        # Get ngrok URL
        if [ -f ngrok.log ]; then
          sleep 3
          NGROK_URL=$(curl -s http://localhost:4040/api/tunnels 2>/dev/null | jq -r '.tunnels[0].public_url // empty')
          if [ -n "$NGROK_URL" ]; then
            NGROK_HOST=$(echo $NGROK_URL | sed 's/tcp:\/\///' | cut -d':' -f1)
            NGROK_PORT=$(echo $NGROK_URL | cut -d':' -f3)
            echo "NGROK_HOST=$NGROK_HOST" >> $GITHUB_ENV
            echo "NGROK_PORT=$NGROK_PORT" >> $GITHUB_ENV
            echo "✅ ngrok: $NGROK_HOST:$NGROK_PORT"
          fi
        fi
        
        # Get cloudflared URL
        sleep 3
        CLOUDFLARE_URL=$(grep -o 'https://[a-z0-9.-]*\.trycloudflare\.com' cloudflared.log 2>/dev/null | head -1)
        if [ -n "$CLOUDFLARE_URL" ]; then
          echo "CLOUDFLARE_URL=$CLOUDFLARE_URL" >> $GITHUB_ENV
          echo "✅ cloudflared: $CLOUDFLARE_URL"
        fi
        
        # Get public IP
        PUBLIC_IP=$(curl -s ifconfig.me)
        echo "PUBLIC_IP=$PUBLIC_IP" >> $GITHUB_ENV
        
    - name: 📝 Generate connection info
      run: |
        # Tạo file HTML đẹp
        cat > connection-info.html << 'EOF'
<!DOCTYPE html>
<html lang="vi">
<head>
