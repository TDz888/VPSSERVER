            </div>
            
            <h3>🚀 Connection Methods</h3>
            
            <div id="ngrok_section">
                <h3>📡 Method 1: ngrok (TCP Tunnel)</h3>
                <div class="info-box">
                    <p><strong>Host:</strong> <code id="ngrok_host">NGROK_HOST_PLACEHOLDER</code></p>
                    <p><strong>Port:</strong> <code id="ngrok_port">NGROK_PORT_PLACEHOLDER</code></p>
                    <div class="command" id="ngrok_cmd">ssh USERNAME_PLACEHOLDER@NGROK_HOST_PLACEHOLDER -p NGROK_PORT_PLACEHOLDER</div>
                    <button class="copy-btn" onclick="copyText('ngrok_cmd')">📋 Copy SSH Command</button>
                </div>
            </div>
            
            <div id="cloudflare_section">
                <h3>☁️ Method 2: Cloudflare Tunnel (Web SSH)</h3>
                <div class="info-box">
                    <p><strong>Tunnel URL:</strong> <code id="cf_url">CLOUDFLARE_URL_PLACEHOLDER</code></p>
                    <div class="command" id="cf_cmd">cloudflared access ssh --hostname CLOUDFLARE_URL_PLACEHOLDER</div>
                    <button class="copy-btn" onclick="copyText('cf_cmd')">📋 Copy Command</button>
                    <p style="margin-top: 10px; font-size: 14px;">
                        💡 <strong>Or use browser:</strong> 
                        <a href="CLOUDFLARE_URL_PLACEHOLDER" target="_blank" style="color: #667eea;">Open in Browser</a>
                    </p>
                </div>
            </div>
            
            <hr>
            
            <h3>📝 Quick SSH Commands</h3>
            <div class="command" id="ssh_manual">
                # After connecting, you can run:
                sudo apt update && sudo apt upgrade -y
                sudo apt install nginx -y
                python3 --version
                free -h
                df -h
            </div>
            
            <hr>
            
            <h3>📊 System Info</h3>
            <div class="info-box" id="system_info">
                <p>Loading system info...</p>
            </div>
        </div>
    </div>
    
    <script>
        function copyText(elementId) {
            const element = document.getElementById(elementId);
            const text = element.innerText;
            navigator.clipboard.writeText(text);
            alert('✅ Copied to clipboard!');
        }
        
        // Fill data from variables
        document.getElementById('username').innerText = 'USERNAME_PLACEHOLDER';
        document.getElementById('password').innerText = 'PASSWORD_PLACEHOLDER';
        document.getElementById('public_ip').innerText = 'PUBLIC_IP_PLACEHOLDER';
        
        if (document.getElementById('ngrok_host') && 'NGROK_HOST_PLACEHOLDER' !== '') {
            document.getElementById('ngrok_host').innerText = 'NGROK_HOST_PLACEHOLDER';
            document.getElementById('ngrok_port').innerText = 'NGROK_PORT_PLACEHOLDER';
            document.getElementById('ngrok_cmd').innerText = 'ssh USERNAME_PLACEHOLDER@NGROK_HOST_PLACEHOLDER -p NGROK_PORT_PLACEHOLDER';
        } else {
            document.getElementById('ngrok_section').style.display = 'none';
        }
        
        if (document.getElementById('cf_url') && 'CLOUDFLARE_URL_PLACEHOLDER' !== '') {
            document.getElementById('cf_url').innerText = 'CLOUDFLARE_URL_PLACEHOLDER';
            document.getElementById('cf_cmd').innerHTML = document.getElementById('cf_cmd').innerHTML.replace('CLOUDFLARE_URL_PLACEHOLDER', 'CLOUDFLARE_URL_PLACEHOLDER');
        } else {
            document.getElementById('cloudflare_section').style.display = 'none';
        }
        
        document.getElementById('ssh_manual').innerHTML = document.getElementById('ssh_manual').innerHTML;
    </script>
</body>
</html>
EOF

        # Replace placeholders
        sed -i "s/USERNAME_PLACEHOLDER/$USERNAME/g" connection-info.html
        sed -i "s/PASSWORD_PLACEHOLDER/$PASSWORD/g" connection-info.html
        sed -i "s/PUBLIC_IP_PLACEHOLDER/$PUBLIC_IP/g" connection-info.html
        sed -i "s/DURATION_PLACEHOLDER/${{ github.event.inputs.duration }}/g" connection-info.html
        sed -i "s|NGROK_HOST_PLACEHOLDER|${NGROK_HOST:-Not Available}|g" connection-info.html
        sed -i "s/NGROK_PORT_PLACEHOLDER/${NGROK_PORT:-N/A}/g" connection-info.html
        sed -i "s|CLOUDFLARE_URL_PLACEHOLDER|${CLOUDFLARE_URL:-Not Available}|g" connection-info.html
        
        # Create simple text info
        cat > vps-info.txt << 'TXTEOF'
