name: Create Ubuntu VPS

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Username'
        required: true
        default: 'ubuntu-vps'
      duration:
        description: 'Duration (hours)'
        required: true
        default: '6'

jobs:
  create-vps:
    runs-on: ubuntu-latest
    
    steps:
    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-server curl jq
        
    - name: Create user
      run: |
        USERNAME="${{ github.event.inputs.username }}"
        PASSWORD=$(openssl rand -base64 12 | tr -d '=+/' | cut -c1-12)
        echo "USERNAME=$USERNAME" >> $GITHUB_ENV
        echo "PASSWORD=$PASSWORD" >> $GITHUB_ENV
        sudo useradd -m -s /bin/bash $USERNAME
        echo "$USERNAME:$PASSWORD" | sudo chpasswd
        sudo usermod -aG sudo $USERNAME
        
    - name: Configure SSH
      run: |
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
        
    - name: Install ngrok
      run: |
        wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
        tar xzf ngrok-v3-stable-linux-amd64.tgz
        sudo mv ngrok /usr/local/bin/
        if [ -n "${{ secrets.NGROK_TOKEN }}" ]; then
          ngrok config add-authtoken ${{ secrets.NGROK_TOKEN }}
        fi
        
    - name: Install cloudflared
      run: |
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
        chmod +x cloudflared-linux-amd64
        sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
        
    - name: Start tunnels
      run: |
        if [ -n "${{ secrets.NGROK_TOKEN }}" ]; then
          nohup ngrok tcp 22 > ngrok.log 2>&1 &
        fi
        nohup cloudflared tunnel --url ssh://localhost:22 > cloudflared.log 2>&1 &
        sleep 10
        
    - name: Get tunnel URLs
      run: |
        if [ -f ngrok.log ]; then
          sleep 2
          NGROK_URL=$(curl -s http://localhost:4040/api/tunnels 2>/dev/null | jq -r '.tunnels[0].public_url // empty')
          if [ -n "$NGROK_URL" ]; then
            echo "NGROK_URL=$NGROK_URL" >> $GITHUB_ENV
          fi
        fi
        
        CLOUDFLARE_URL=$(grep -o 'https://[a-z0-9.-]*\.trycloudflare\.com' cloudflared.log 2>/dev/null | head -1)
        if [ -n "$CLOUDFLARE_URL" ]; then
          echo "CLOUDFLARE_URL=$CLOUDFLARE_URL" >> $GITHUB_ENV
        fi
        
        PUBLIC_IP=$(curl -s ifconfig.me)
        echo "PUBLIC_IP=$PUBLIC_IP" >> $GITHUB_ENV
        
    - name: Save connection info
      run: |
        echo "========================================="
        echo "UBUNTU VPS READY"
        echo "========================================="
        echo "Username: $USERNAME"
        echo "Password: $PASSWORD"
        echo "Public IP: $PUBLIC_IP"
        echo ""
        echo "ngrok: $NGROK_URL"
        echo "Cloudflare: $CLOUDFLARE_URL"
        echo "========================================="
        
        echo "UBUNTU VPS CONNECTION INFO" > vps-info.txt
        echo "=========================================" >> vps-info.txt
        echo "Username: $USERNAME" >> vps-info.txt
        echo "Password: $PASSWORD" >> vps-info.txt
        echo "Public IP: $PUBLIC_IP" >> vps-info.txt
        echo "" >> vps-info.txt
        echo "--- ngrok (TCP) ---" >> vps-info.txt
        echo "URL: $NGROK_URL" >> vps-info.txt
        echo "SSH: ssh $USERNAME@$(echo $NGROK_URL | sed 's/tcp:\/\///' | cut -d':' -f1) -p $(echo $NGROK_URL | cut -d':' -f3)" >> vps-info.txt
        echo "" >> vps-info.txt
        echo "--- Cloudflare Tunnel ---" >> vps-info.txt
        echo "URL: $CLOUDFLARE_URL" >> vps-info.txt
        echo "Command: cloudflared access ssh --hostname $CLOUDFLARE_URL" >> vps-info.txt
        echo "" >> vps-info.txt
        echo "Created: $(date)" >> vps-info.txt
        echo "Duration: ${{ github.event.inputs.duration }} hours" >> vps-info.txt
        
    - name: Upload info
      uses: actions/upload-artifact@v4
      with:
        name: vps-info
        path: vps-info.txt
        
    - name: Keep alive
      run: |
        HOURS=${{ github.event.inputs.duration }}
        SECONDS=$((HOURS * 3600))
        echo "VPS running for $HOURS hours"
        sleep $SECONDS
